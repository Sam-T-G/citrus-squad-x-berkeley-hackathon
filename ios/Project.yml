name: CitrusSquad
options:
  bundleIdPrefix: com.citrussquad
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
# Per-developer signing (team + bundle id) lives in Local.xcconfig, which is gitignored.
# Run ./setup.sh once; it creates Local.xcconfig from Local.xcconfig.example.
configFiles:
  Debug: Local.xcconfig
  Release: Local.xcconfig
settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: complete
# Google Maps SDK for iOS. SPM is the supported install path (CocoaPods is deprecated).
# Rendering a native map and the my-location dot is free; only the Directions web call is billed,
# and that path stays governed in DirectionsService. See ios/README.md "Cost control".
packages:
  GoogleMaps:
    url: https://github.com/googlemaps/ios-maps-sdk
    from: "9.0.0"
targets:
  CitrusSquad:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: GoogleMaps
        product: GoogleMaps
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: CitrusSquad
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: CitrusSquad reads heading and GPS to compute which way to turn.
        NSMotionUsageDescription: CitrusSquad reads the accelerometer and gyroscope for motion features.
        NSCameraUsageDescription: CitrusSquad uses the LiDAR depth camera to sense nearby obstacles.
        NSMicrophoneUsageDescription: CitrusSquad listens while you hold the talk button, so you can speak a destination or ask what is around you.
        # Injected at build time from Local.xcconfig (gitignored). The plist stores the literal
        # $(VAR); the real key only appears in the build output, which is also gitignored.
        # Read in Swift through Sources/Secrets.swift. See docs/14-voice-and-reasoning-plan.md.
        DeepgramAPIKey: "$(DEEPGRAM_API_KEY)"
        AnthropicAPIKey: "$(ANTHROPIC_API_KEY)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(APP_BUNDLE_ID)
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        SUPPORTS_MACCATALYST: NO
  CitrusSquadTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: CitrusSquad
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CitrusSquad.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/CitrusSquad"
        BUNDLE_LOADER: "$(TEST_HOST)"
